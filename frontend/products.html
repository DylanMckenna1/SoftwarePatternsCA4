<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products | Clothes Store</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="navbar">
       <div class="brand">Clothes Store</div>
<nav>
    <a href="index.html">Home</a>
    <a href="products.html">Products</a>
    <a href="cart.html">Cart <span id="cartCountBadge" class="cart-badge">0</span></a>
    <a href="login.html">Login</a>
    <a href="register.html">Register</a>
</nav>
    </header>

    <main class="page-container">
        <section class="page-header">
            <h1>Product Catalogue</h1>
            <p>Browse available clothing items, search by title and sort the results.</p>
        </section>

        <section id="pageMessage"></section>

        <section class="filters">
            <input type="text" id="searchInput" placeholder="Search by title">
            <input type="text" id="categoryInput" placeholder="Search by category">
            <input type="text" id="manufacturerInput" placeholder="Search by manufacturer">

            <select id="sortSelect">
                <option value="">Sort by</option>
                <option value="price-asc">Price: Low to High</option>
                <option value="price-desc">Price: High to Low</option>
                <option value="title-asc">Title: A-Z</option>
                <option value="title-desc">Title: Z-A</option>
                <option value="manufacturer-asc">Manufacturer: A-Z</option>
                <option value="manufacturer-desc">Manufacturer: Z-A</option>
            </select>

            <button id="searchButton">Search</button>
            <button id="resetButton">Reset</button>
        </section>

        <section id="productGrid" class="product-grid"></section>
    </main>

    <script type="module" src="js/app.js?v=20260420-2"></script>
</body>
</html>
