<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart | Clothes Store</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="navbar">
        <div class="brand">Clothes Store <span id="cartCountBadge" class="cart-badge">0</span></div>
        <nav>
            <a href="index.html">Home</a>
            <a href="products.html">Products</a>
            <a href="cart.html">Cart</a>
            <a href="login.html">Login</a>
            <a href="register.html">Register</a>
        </nav>
    </header>

    <main class="cart-container">
        <section class="page-header">
            <h1>Your Cart</h1>
            <p>Review the items you have selected and place your order.</p>
        </section>

        <section id="pageMessage"></section>

        <section id="cartItems"></section>

        <section class="cart-summary">
            <h2>Total</h2>
            <p id="cartTotal">€0.00</p>
            <button id="checkoutButton" class="cart-button">Place Order</button>
            <p id="checkoutMessage"></p>

            <div id="ratingSection" class="rating-section" style="display: none;">
                <h3>Rate Your Order</h3>

                <label for="orderIdInput">Order ID</label>
                <input type="number" id="orderIdInput" placeholder="Enter order ID">

                <label for="ratingScore">Rating</label>
                <select id="ratingScore">
                    <option value="5">5 - Excellent</option>
                    <option value="4">4 - Good</option>
                    <option value="3">3 - Average</option>
                    <option value="2">2 - Poor</option>
                    <option value="1">1 - Bad</option>
                </select>

                <label for="ratingComment">Comment</label>
                <textarea id="ratingComment" placeholder="Write a short review"></textarea>

                <button id="submitRatingButton" class="cart-button">Submit Rating</button>
                <p id="ratingMessage"></p>
            </div>
        </section>
    </main>

    <script type="module" src="js/app.js"></script>
</body>
</html>
