<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart | Clothes Store</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="navbar">
        <div class="brand">Clothes Store</div>
        <nav>
            <a href="index.html">Home</a>
            <a href="products.html">Products</a>
            <a href="cart.html">Cart <span id="cartCountBadge" class="cart-badge">0</span></a>
            <a href="login.html">Login</a>
            <a href="register.html">Register</a>
        </nav>
    </header>

    <main class="cart-container">
        <section class="page-header">
            <h1>Your Cart</h1>
            <p>Review the items you have selected and place your order.</p>
        </section>

        <section id="pageMessage"></section>

        <section id="cartItems"></section>

        <section class="cart-summary">
            <h2>Total</h2>
            <p id="cartTotal">€0.00</p>

            <div class="checkout-details">
                <label for="customerNameInput">Customer Name</label>
                <input type="text" id="customerNameInput" placeholder="Enter your full name">

                <label for="shippingAddressInput">Shipping Address</label>
                <input type="text" id="shippingAddressInput" placeholder="Enter your shipping address">

                <label for="paymentMethodSelect">Payment Method</label>
                <select id="paymentMethodSelect">
                    <option value="">Select payment method</option>
                    <option value="Card">Card</option>
                    <option value="PayPal">PayPal</option>
                    <option value="Cash on Delivery">Cash on Delivery</option>
                </select>
            </div>

            <button id="checkoutButton" class="cart-button">Place Order</button>
            <p id="checkoutMessage"></p>

            <div id="ratingSection" class="rating-section" style="display: none;">
                <h3>Rate Your Order</h3>

                <p><strong>Order ID:</strong> <span id="orderIdDisplay">Not available</span></p>
                <input type="hidden" id="orderIdInput">

                <label for="ratingScore">Rating</label>
                <select id="ratingScore">
                    <option value="5">5 - Excellent</option>
                    <option value="4">4 - Good</option>
                    <option value="3">3 - Average</option>
                    <option value="2">2 - Poor</option>
                    <option value="1">1 - Bad</option>
                </select>

                <label for="ratingComment">Comment</label>
                <textarea id="ratingComment" placeholder="Write a short review"></textarea>

                <button id="submitRatingButton" class="cart-button">Submit Rating</button>
                <p id="ratingMessage"></p>
            </div>
        </section>
    </main>

    <script type="module" src="js/app.js?v=20260420-2"></script>
</body>
</html>
