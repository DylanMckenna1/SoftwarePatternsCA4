<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | Clothes Store</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="navbar">
        <div class="brand">Clothes Store</div>
        <nav>
            <a href="index.html">Home</a>
            <a href="products.html">Products</a>
            <a href="cart.html">Cart</a>
            <a href="admin.html">Admin</a>
        </nav>
    </header>

    <main class="page-container">
        <section class="page-header">
            <h1>Admin Product Management</h1>
            <p>Manage catalogue items through secured admin endpoints.</p>
        </section>

        <section class="auth-card">
            <h2>Admin Login</h2>
            <form id="adminLoginForm" class="auth-form">
                <label for="adminUsername">Username</label>
                <input type="text" id="adminUsername" required>

                <label for="adminPassword">Password</label>
                <input type="password" id="adminPassword" required>

                <button type="submit" class="cart-button">Connect</button>
                <p id="adminLoginMessage"></p>
            </form>
        </section>

        <section id="adminPanel" style="display: none;">
            <div class="admin-grid">
                <section class="auth-card">
                    <h2>Add / Update Product</h2>
                    <form id="adminProductForm" class="auth-form">
                        <input type="hidden" id="productId">

                        <label for="productTitle">Title</label>
                        <input type="text" id="productTitle" required>

                        <label for="productDescription">Description</label>
                        <input type="text" id="productDescription" required>

                        <label for="productPrice">Price</label>
                        <input type="number" step="0.01" id="productPrice" required>

                        <label for="productStock">Stock Quantity</label>
                        <input type="number" id="productStock" required>

                        <label for="productImageUrl">Image URL</label>
                        <input type="text" id="productImageUrl" required>

                        <label for="productSize">Size</label>
                        <input type="text" id="productSize" required>

                        <label for="productColour">Colour</label>
                        <input type="text" id="productColour" required>

                        <label for="productCategory">Category</label>
                        <input type="text" id="productCategory" required>

                        <label for="productManufacturer">Manufacturer</label>
                        <input type="text" id="productManufacturer" required>

                        <div class="admin-form-actions">
                            <button type="submit" class="cart-button">Save Product</button>
                            <button type="button" id="clearAdminFormButton" class="details-button">Clear</button>
                        </div>

                        <p id="adminProductMessage"></p>
                    </form>
                </section>

                <section class="auth-card">
                    <h2>Products</h2>
                    <div id="adminProductsList"></div>
                </section>
            </div>
        </section>
    </main>

    <script type="module" src="js/admin.js"></script>
</body>
</html>
